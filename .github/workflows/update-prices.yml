name: Update Card Prices

on:
  schedule:
    - cron: '0 6 * * *'   # 毎日15:00 JST (06:00 UTC)
  workflow_dispatch:        # 手動実行も可能

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch latest prices
        env:
          POKETRACE_API_KEY: ${{ secrets.POKETRACE_API_KEY }}
        run: python update_prices.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          git diff --cached --quiet || git commit -m "Auto-update prices $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
