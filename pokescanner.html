<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<meta name="theme-color" content="#060609">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="PokeScanner Pro – ポケモンカードの画像からレアリティ・コンディション・市場価格をAI鑑定">
<title>PokeScanner Pro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060609;color:#e2e8f0;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;max-width:480px;margin:0 auto;padding-bottom:80px;min-height:100vh;-webkit-font-smoothing:antialiased}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes bar{0%{top:5%;opacity:0}15%{opacity:1}85%{opacity:1}100%{top:95%;opacity:0}}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(124,58,237,.3)}50%{box-shadow:0 0 20px rgba(124,58,237,.6)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

#header{padding:14px 16px;background:rgba(8,8,16,.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.04);position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:10px}
.icon{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#1e3a5f,#3b0764);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;box-shadow:0 2px 8px rgba(59,7,100,.4)}
.title{font-size:16px;font-weight:900;letter-spacing:-.3px}
.sub{font-size:9px;color:#444;letter-spacing:1.5px;margin-top:1px}
.pro-badge{margin-left:auto;font-size:9px;background:linear-gradient(135deg,#1a1a2e,#0f0f1e);border:1px solid #3b0764;color:#a78bfa;padding:3px 8px;border-radius:5px;font-weight:700;letter-spacing:1.2px}

#main{padding:16px}

#apikey-wrap{display:flex;gap:8px;align-items:center;margin-bottom:14px}
#apikey-wrap label{font-size:11px;color:#3d4a5c;flex-shrink:0;white-space:nowrap;font-weight:600}
#apikey{flex:1;padding:9px 11px;background:#0c0c14;border:1px solid #1a1a2e;border-radius:8px;color:#94a3b8;font-size:11px;font-family:'SF Mono',SFMono-Regular,Menlo,monospace;outline:none;min-width:0;transition:border-color .2s}
#apikey:focus{border-color:#7c3aed}
.apikey-saved{font-size:9px;color:#4ade80;flex-shrink:0;opacity:0;transition:opacity .3s}
.apikey-saved.show{opacity:1}

#dropzone{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;border-radius:14px;border:2px dashed #1e2535;background:#08080f;aspect-ratio:4/3;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
#dropzone:hover,#dropzone.drag-over{border-color:#7c3aed;background:#0a0a18}
#dropzone.drag-over::after{content:'ここにドロップ';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(124,58,237,.1);color:#a78bfa;font-size:15px;font-weight:700;border-radius:14px}
.dz-emoji{font-size:44px}
.dz-txt{font-size:14px;color:#3d4a5c;font-weight:700}
.dz-sub{font-size:10px;color:#1e2535;margin-top:-4px}
.dz-methods{display:flex;gap:6px;margin-top:4px}
.dz-method{font-size:9px;color:#334155;background:#0c0c18;padding:3px 8px;border-radius:4px;border:1px solid #1a1a2e}

#preview-wrap{position:relative;border-radius:14px;overflow:hidden;background:#000;display:none;box-shadow:0 4px 20px rgba(0,0,0,.5)}
#preview-wrap img{width:100%;display:block;max-height:400px;object-fit:contain}
#scan-bar{position:absolute;left:5%;width:90%;height:2px;background:linear-gradient(90deg,transparent,#7c3aed,#38bdf8,#7c3aed,transparent);display:none;box-shadow:0 0 12px #7c3aed}
#overlay{position:absolute;inset:0;background:rgba(0,0,0,.75);display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;animation:fadeIn .2s}
#spinner{width:40px;height:40px;border:3px solid #1a1a3a;border-top-color:#7c3aed;border-radius:50%;animation:spin .7s linear infinite}
#phase-txt{font-size:11px;color:#94a3b8;animation:pulse 1.5s infinite}
#progress-bar{width:60%;height:3px;background:#1a1a2e;border-radius:2px;overflow:hidden;margin-top:-4px}
#progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#7c3aed,#38bdf8);border-radius:2px;transition:width .5s ease}

#btn-area{margin-top:12px}
.btn-row{display:flex;gap:8px}
.primary-label{display:block;flex:1;padding:14px;border-radius:10px;border:1px solid #1a1a2e;background:#0c0c14;color:#60a5fa;font-size:14px;font-weight:700;text-align:center;cursor:pointer;transition:all .2s}
.primary-label:hover{background:#0f0f1e;border-color:#1e40af}
.camera-label{display:block;padding:14px 16px;border-radius:10px;border:1px solid #1a1a2e;background:#0c0c14;color:#a78bfa;font-size:14px;font-weight:700;text-align:center;cursor:pointer;transition:all .2s;flex-shrink:0}
.camera-label:hover{background:#0f0f1e;border-color:#3b0764}
#btn-grid{display:none;grid-template-columns:1fr 1fr;gap:8px}
#btn-reset{padding:13px;border-radius:10px;border:1px solid #1e1e30;background:#0c0c14;color:#666;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
#btn-reset:hover{background:#0f0f1e;color:#94a3b8}
#btn-scan{padding:13px;border-radius:10px;border:none;background:linear-gradient(135deg,#1e40af,#7c3aed);color:#fff;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
#btn-scan:hover{box-shadow:0 4px 16px rgba(124,58,237,.4)}
#btn-scan:disabled{background:#151520;color:#333;cursor:not-allowed;box-shadow:none}

#status-bar{margin-top:10px;padding:8px 12px;background:#0a0a18;border:1px solid #1a1a30;border-radius:8px;font-size:10px;color:#4ade80;font-family:monospace;display:none;line-height:1.6}
#err{margin-top:10px;padding:11px 14px;background:#180808;border:1px solid #380808;border-radius:8px;font-size:11px;color:#f87171;line-height:1.6;word-break:break-all;font-family:monospace;display:none}
.err-hint{font-size:10px;color:#7f1d1d;margin-top:4px}

#results{margin-top:18px;animation:up .3s ease;display:none}

#rare-alert{display:none;margin-bottom:14px;padding:14px 16px;background:linear-gradient(135deg,#1a0a00,#1a1000);border:1px solid #92400e;border-radius:12px;animation:glow 2s ease-in-out infinite}
.rare-alert-title{font-size:12px;color:#fbbf24;font-weight:800;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.rare-alert-body{font-size:12px;color:#b45309;line-height:1.7}
.rare-alert-body b{color:#f59e0b}

#total-box{background:#080f18;border:1px solid #0f1e30;border-radius:14px;padding:16px 18px;margin-bottom:12px}
.total-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.total-label{font-size:9px;color:#2a3d52;letter-spacing:1.5px;font-weight:600}
.total-count{font-size:9px;color:#2a3d52;font-weight:600}
.total-value{font-size:30px;font-weight:900;color:#fbbf24;font-family:'SF Mono',monospace;line-height:1;letter-spacing:-.5px}
.total-range{font-size:11px;color:#334155;margin-top:4px}
.total-summary{margin-top:12px;padding-top:12px;border-top:1px solid #0f1520;font-size:12px;color:#4a5568;line-height:1.8}
.total-actions{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid #0f1520}
.action-btn{flex:1;padding:8px;border-radius:8px;border:1px solid #1a1a2e;background:#0a0a14;color:#64748b;font-size:11px;font-weight:600;cursor:pointer;text-align:center;transition:all .2s}
.action-btn:hover{background:#0f0f1e;color:#94a3b8}
.action-btn.copied{color:#4ade80;border-color:#052e16}

#market-section{margin-bottom:12px;display:none}
.market-title{font-size:10px;color:#2a3d52;letter-spacing:1.2px;margin-bottom:8px;font-weight:600}
.market-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#080f18;border:1px solid #0f1e30;border-radius:10px;margin-bottom:4px}
.market-name{font-size:11px;color:#64748b}
.market-price{font-size:13px;font-weight:700;color:#fbbf24;font-family:monospace}
.market-source{font-size:9px;color:#1e2a3a}

#cards-list{}
.card{background:#0c0c14;border:1px solid #1a1a2e;border-radius:14px;padding:15px 17px;margin-bottom:10px;animation:up .35s ease both;transition:border-color .2s}
.card:hover{border-color:#252540}
.card-inner{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.card-left{flex:1;min-width:0}
.card-tags{display:flex;gap:5px;margin-bottom:7px;flex-wrap:wrap}
.tag{font-size:9px;padding:3px 8px;border-radius:5px;font-weight:700;letter-spacing:.3px}
.tag-vintage{background:#422006;color:#fde68a}
.tag-psa{background:#052e16;color:#6ee7b7}
.tag-ultra{background:#3b0764;color:#e9d5ff}
.tag-warn{background:#1a0505;color:#f87171;border:1px solid #3a0808}
.tag-1st{background:#1e1b4b;color:#818cf8}
.card-name{font-size:17px;font-weight:800;color:#e2e8f0;margin-bottom:3px;letter-spacing:-.2px}
.card-meta{font-size:11px;color:#3d4a5c;margin-bottom:8px}
.rarity-badge{display:inline-flex;align-items:center;gap:5px;border-radius:6px;padding:4px 10px}
.rarity-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.rarity-score{font-size:10px;opacity:.6}
.card-right{text-align:right;flex-shrink:0}
.card-avg{font-size:22px;font-weight:900;font-family:monospace;letter-spacing:-.5px}
.card-range{font-size:10px;color:#374151;margin-top:2px}
.card-cond{font-size:10px;color:#374151;margin-top:3px}

.condition-detail{margin-top:10px;padding-top:10px;border-top:1px solid #1a1a2e}
.condition-title{font-size:9px;color:#334155;letter-spacing:1px;margin-bottom:6px;font-weight:600}
.condition-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.cond-item{background:#080810;border-radius:6px;padding:6px;text-align:center}
.cond-label{font-size:8px;color:#3d4a5c;margin-bottom:2px;text-transform:uppercase;letter-spacing:.5px}
.cond-value{font-size:10px;font-weight:600;color:#94a3b8}

.psa-section{margin-top:10px;padding-top:10px;border-top:1px solid #1a1a2e}
.psa-title{font-size:9px;color:#334155;letter-spacing:1px;margin-bottom:6px;font-weight:600}
.psa-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.psa-cell{background:#080810;border-radius:7px;padding:6px 4px;text-align:center;transition:background .2s}
.psa-cell:hover{background:#0f0f1e}
.psa-grade{font-size:9px;color:#4a5568;font-weight:600}
.psa-price{font-size:10px;font-weight:700;font-family:monospace}
.psa-highlight{background:#0f0f1e;border:1px solid #7c3aed40}

.card-notes{margin-top:8px;font-size:11px;color:#4a5568;line-height:1.7}
.circulation{margin-top:7px;font-size:10px;color:#374151;display:flex;align-items:center;gap:4px}
.circulation b{color:#fbbf24}

#history-section{margin-top:24px;display:none}
.history-title{font-size:10px;color:#2a3d52;letter-spacing:1.2px;margin-bottom:8px;font-weight:600;display:flex;justify-content:space-between;align-items:center}
.history-clear{font-size:9px;color:#f87171;cursor:pointer;border:none;background:none;padding:2px 6px}
.history-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#080f18;border:1px solid #0f1e30;border-radius:10px;margin-bottom:4px;cursor:pointer;transition:all .2s}
.history-item:hover{background:#0c0c1a;border-color:#1e2535}
.history-left{display:flex;flex-direction:column;gap:2px}
.history-name{font-size:12px;color:#94a3b8;font-weight:600}
.history-date{font-size:9px;color:#2a3d52}
.history-price{font-size:13px;font-weight:700;color:#fbbf24;font-family:monospace}

#btn-rescan{width:100%;margin-top:10px;padding:13px;border-radius:10px;border:1px solid #1a1a2e;background:transparent;color:#4a5568;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
#btn-rescan:hover{color:#94a3b8;background:#0c0c14}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#e2e8f0;padding:10px 20px;border-radius:8px;font-size:12px;font-weight:600;z-index:100;animation:up .3s ease;box-shadow:0 4px 16px rgba(0,0,0,.5);pointer-events:none}
</style>
</head>
<body>

<div id="header">
  <div class="icon" role="img" aria-label="PokeScanner">⚡</div>
  <div>
    <div class="title">PokeScanner</div>
    <div class="sub">RARITY · VALUE · ANALYSIS</div>
  </div>
  <div class="pro-badge" aria-label="Pro版">PRO</div>
</div>

<div id="main" role="main">
  <div id="apikey-wrap">
    <label for="apikey">API Key</label>
    <input id="apikey" type="password" placeholder="sk-ant-..." autocomplete="off" spellcheck="false" aria-label="Anthropic APIキー">
    <span class="apikey-saved" id="apikey-saved" aria-live="polite">保存済</span>
  </div>

  <div id="dropzone" role="button" tabindex="0" aria-label="画像を選択またはドロップしてカードをスキャン">
    <div class="dz-emoji" aria-hidden="true">🃏</div>
    <div class="dz-txt">タップして画像を選択</div>
    <div class="dz-sub">写真ライブラリ / ファイル / ドラッグ&amp;ドロップ</div>
    <div class="dz-methods">
      <span class="dz-method">JPG</span>
      <span class="dz-method">PNG</span>
      <span class="dz-method">WebP</span>
      <span class="dz-method">HEIC</span>
    </div>
  </div>
  <input id="fi1" type="file" accept="image/*" style="display:none" aria-hidden="true">

  <div id="preview-wrap">
    <img id="preview-img" src="" alt="スキャン対象のカード画像">
    <div id="scan-bar" style="animation:bar 1.5s ease-in-out infinite"></div>
    <div id="overlay" role="status" aria-live="polite">
      <div id="spinner" aria-hidden="true"></div>
      <div id="phase-txt">カード識別中...</div>
      <div id="progress-bar"><div id="progress-fill"></div></div>
    </div>
  </div>

  <div id="btn-area" style="margin-top:12px">
    <div class="btn-row" id="btn-initial-row">
      <label class="primary-label" id="label-file" role="button" tabindex="0">🖼️ カードを読み込む</label>
      <label class="camera-label" id="label-camera" role="button" tabindex="0">📷</label>
    </div>
    <input id="fi2" type="file" accept="image/*" style="display:none" aria-hidden="true">
    <input id="fi-camera" type="file" accept="image/*" capture="environment" style="display:none" aria-hidden="true">
    <div id="btn-grid">
      <button id="btn-reset" aria-label="やり直す">やり直す</button>
      <button id="btn-scan">⚡ 判定する</button>
    </div>
  </div>

  <div id="status-bar" role="status" aria-live="polite"></div>
  <div id="err" role="alert" aria-live="assertive"></div>

  <div id="results">
    <div id="rare-alert" role="alert">
      <div class="rare-alert-title">⚠️ 超希少カード検出</div>
      <div class="rare-alert-body" id="rare-alert-body"></div>
    </div>
    <div id="total-box">
      <div class="total-row">
        <div class="total-label">TOTAL ESTIMATED VALUE</div>
        <div class="total-count" id="card-count"></div>
      </div>
      <div class="total-value" id="total-avg"></div>
      <div class="total-range" id="total-range"></div>
      <div class="total-summary" id="total-summary"></div>
      <div class="total-actions">
        <button class="action-btn" id="btn-share" aria-label="結果をコピー">📋 結果をコピー</button>
        <button class="action-btn" id="btn-save" aria-label="履歴に保存">💾 履歴に保存</button>
      </div>
    </div>
    <div id="market-section">
      <div class="market-title">📊 AI推定参考相場</div>
      <div id="market-list"></div>
    </div>
    <div id="cards-list"></div>
    <button id="btn-rescan">別のカードをスキャン</button>
  </div>

  <div id="history-section">
    <div class="history-title">
      <span>📜 スキャン履歴</span>
      <button class="history-clear" id="btn-history-clear">全削除</button>
    </div>
    <div id="history-list"></div>
  </div>
</div>

<script>

function matchUltraRare(cardName, set, notes) {
  const name = (cardName || "").replace(/\s/g,"");
  const setStr = (set || "").toLowerCase();
  const allText = name + setStr + (notes || "");

  if (name.includes("ガルーラ") && (setStr.includes("ジャングル") || setStr.includes("jungle"))) {
    return ULTRA_RARE_DB["ガルーラ"];
  }

  if (name.includes("ピカチュウ") && (allText.includes("コロコロ") || allText.includes("プロモ"))) {
    return ULTRA_RARE_DB["ピカチュウ_コロコロ"];
  }

  if (name.includes("リザードン") && (allText.includes("SAR") || allText.includes("スペシャルアート") || allText.includes("ex"))) {
    return ULTRA_RARE_DB["リザードン_SAR"];
  }

  const directMatches = [
    "リザードン", "ルギア", "ホウオウ", "コイキング", "ミュウツー",
    "カイリュー", "ゲンガー", "ギャラドス", "ブラッキー", "エーフィ",
    "ミュウ", "ピカチュウ"
  ];

  for (const key of directMatches) {
    if (name.includes(key) && ULTRA_RARE_DB[key]) {
      return ULTRA_RARE_DB[key];
    }
  }

  return null;
}

// ============================================================
// IMAGE COMPRESSION
// ============================================================
function compressImage(dataUrl, maxDim, quality) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > maxDim || h > maxDim) {
        const ratio = Math.min(maxDim / w, maxDim / h);
        w = Math.round(w * ratio);
        h = Math.round(h * ratio);
      }
      const canvas = document.createElement("canvas");
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, w, h);
      const compressed = canvas.toDataURL("image/jpeg", quality);
      resolve({ dataUrl: compressed, b64: compressed.split(",")[1], mime: "image/jpeg" });
    };
    img.onerror = () => resolve(null);
    img.src = dataUrl;
  });
}

// ============================================================
// API CALL (with retry)
// ============================================================
async function callClaude(b64Data, mimeType, apiKey, onPhase, onProgress) {
  const MAX_RETRIES = 2;
  let lastError;

  for (let attempt = 0; attempt <= MAX_RETRIES; attempt++) {
    try {
      if (attempt > 0) {
        onPhase(`リトライ中... (${attempt}/${MAX_RETRIES})`);
        await new Promise(r => setTimeout(r, 2000 * attempt));
      }

      onPhase("Phase 1/3: カード識別中...");
      onProgress(10);

      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 3500,
          system: buildSystemPrompt(),
          messages: [{
            role: "user",
            content: [
              { type: "image", source: { type: "base64", media_type: mimeType, data: b64Data } },
              { type: "text", text: `このポケモンカードを詳細に鑑定してください。

重点確認事項：
1. 旧裏面カードかどうか（裏面デザインで判定）
2. カードの正確な名前・セット・番号・初版かどうか
3. 表面・角・エッジ・センタリングの状態（PSA基準で厳密に）
4. 超希少カードや特別な流通背景があるか
5. 現在の日本市場での正確な価格（生カード・PSA鑑定済み両方）
6. 参考となる市場取引データ（marketReferences）

JSON形式のみで返答してください。` }
            ]
          }]
        })
      });

      onPhase("Phase 2/3: レスポンス解析中...");
      onProgress(60);

      const text = await res.text();
      if (!res.ok) {
        let msg = `HTTP ${res.status}`;
        try { msg = JSON.parse(text)?.error?.message || msg; } catch {}

        if (res.status === 429 || res.status >= 500) {
          lastError = new Error(msg);
          continue;
        }

        if (res.status === 401) throw new Error("APIキーが無効です。正しいキーを入力してください。");
        if (res.status === 400) throw new Error("リクエストエラー: " + msg);
        throw new Error(msg);
      }

      const envelope = JSON.parse(text);
      const raw = (envelope.content || []).filter(b => b.type === "text").map(b => b.text).join("");
      if (!raw) throw new Error("APIレスポンスが空です");

      const s = raw.indexOf("{"), e = raw.lastIndexOf("}");
      if (s < 0 || e < 0) throw new Error("JSONが見つかりません");

      let parsed;
      try { parsed = JSON.parse(raw.slice(s, e + 1)); }
      catch (pe) { throw new Error("JSONパース失敗: モデル出力形式の異常"); }

      if (!Array.isArray(parsed.cards)) throw new Error("cardsフィールドが見つかりません");

      onPhase("Phase 3/3: 超希少カードDBと照合中...");
      onProgress(85);
      await new Promise(r => setTimeout(r, 300));

      parsed.cards = parsed.cards.map(card => {
        const match = matchUltraRare(card.name, card.set, card.notes);
        if (match) {
          card._ultraRareMatch = match;
          card.isUltraRare = true;
          if (match.circulation) card.circulation = match.circulation;
          if (match.psaPrices) {
            card.pricing = card.pricing || {};
            card.pricing.psa10 = match.psaPrices[10];
            card.pricing.psa9  = match.psaPrices[9];
            card.pricing.psa8  = match.psaPrices[8];
            card.pricing.psa7  = match.psaPrices[7];
            if (match.rawRange) {
              card.pricing.rawMin = match.rawRange[0];
              card.pricing.rawMax = match.rawRange[1];
            }
          }
        }
        return card;
      });

      onProgress(100);
      return parsed;

    } catch (e) {
      lastError = e;
      if (attempt >= MAX_RETRIES) throw e;
      if (e.message.includes("APIキー") || e.message.includes("リクエストエラー")) throw e;
    }
  }
  throw lastError;
}

// ============================================================
// FILE HANDLING
// ============================================================
async function handleFile(f) {
  if (!f) return;
  clearMsg();
  document.getElementById("results").style.display = "none";

  let mt = f.type || "";
  if (!mt || mt === "application/octet-stream") {
    const ext = f.name.split(".").pop().toLowerCase();
    mt = { jpg:"image/jpeg", jpeg:"image/jpeg", png:"image/png", webp:"image/webp", heic:"image/jpeg", heif:"image/jpeg" }[ext] || "image/jpeg";
  }
  if (mt.includes("heic") || mt.includes("heif")) mt = "image/jpeg";

  const rd = new FileReader();
  rd.onload = async (ev) => {
    const dataUrl = ev.target.result;

    const compressed = await compressImage(dataUrl, 1500, 0.85);
    if (compressed) {
      currentB64 = compressed.b64;
      currentMime = compressed.mime;
      document.getElementById("preview-img").src = compressed.dataUrl;
    } else {
      currentB64 = dataUrl.split(",")[1];
      currentMime = mt;
      document.getElementById("preview-img").src = dataUrl;
    }

    document.getElementById("dropzone").style.display = "none";
    document.getElementById("preview-wrap").style.display = "block";
    document.getElementById("btn-initial-row").style.display = "none";
    document.getElementById("btn-grid").style.display = "grid";
  };
  rd.readAsDataURL(f);
}

// History
document.getElementById("btn-history-clear").addEventListener("click", () => {
  clearHistory();
  renderHistory();
  showToast("履歴を削除しました");
});

function renderHistory() {
  const h = getHistory();
  const section = document.getElementById("history-section");
  const list = document.getElementById("history-list");

  if (h.length === 0) {
    section.style.display = "none";
    return;
  }

  section.style.display = "block";
  list.innerHTML = "";

  h.forEach(entry => {
    const d = new Date(entry.date);
    const dateStr = `${d.getFullYear()}/${(d.getMonth()+1).toString().padStart(2,"0")}/${d.getDate().toString().padStart(2,"0")} ${d.getHours().toString().padStart(2,"0")}:${d.getMinutes().toString().padStart(2,"0")}`;
    const avg = Math.round((entry.totalMin + entry.totalMax) / 2);
    const div = document.createElement("div");
    div.className = "history-item";
    div.innerHTML = `
      <div class="history-left">
        <span class="history-name">${esc(entry.cardNames)}</span>
        <span class="history-date">${esc(dateStr)} · ${entry.count}枚</span>
      </div>
      <span class="history-price">${fmt(avg)}</span>
    `;
    list.appendChild(div);
  });
}

renderHistory();

// ============================================================
// RENDER RESULTS
// ============================================================
function fmt(n) { return n != null ? "¥" + Math.round(n).toLocaleString() : "-"; }

function renderResults(data) {
  const cards = data.cards || [];

  // Ultra rare alert
  const ultraCard = cards.find(c => c.isUltraRare && c._ultraRareMatch?.alert);
  const rareAlertEl = document.getElementById("rare-alert");
  if (ultraCard) {
    document.getElementById("rare-alert-body").innerHTML = ultraCard._ultraRareMatch.alert;
    rareAlertEl.style.display = "block";
  } else {
    rareAlertEl.style.display = "none";
  }

  // Total
  const totalMin = data.totalRawMin || 0;
  const totalMax = data.totalRawMax || 0;
  const totalAvg = Math.round((totalMin + totalMax) / 2);
  document.getElementById("total-avg").textContent = fmt(totalAvg);
  document.getElementById("total-range").textContent = fmt(totalMin) + " 〜 " + fmt(totalMax) + "（生カード推定）";
  document.getElementById("card-count").textContent = cards.length + "枚検出";
  const sumEl = document.getElementById("total-summary");
  sumEl.textContent = data.overallAssessment || "";
  sumEl.style.display = data.overallAssessment ? "block" : "none";

  // Market references
  const marketSection = document.getElementById("market-section");
  const marketList = document.getElementById("market-list");
  const refs = data.marketReferences || [];
  if (refs.length > 0) {
    marketSection.style.display = "block";
    marketList.innerHTML = "";
    refs.forEach(ref => {
      const div = document.createElement("div");
      div.className = "market-item";
      div.innerHTML = `
        <div>
          <div class="market-name">${esc(ref.name)}</div>
          <div class="market-source">${esc(ref.source || '')}</div>
        </div>
        <div class="market-price">${fmt(ref.price)}</div>
      `;
      marketList.appendChild(div);
    });
  } else {
    marketSection.style.display = "none";
  }

  // Cards
  const list = document.getElementById("cards-list");
  list.innerHTML = "";

  cards.forEach((card, i) => {
    const c = RARITY[card.rarity] || RARITY["Common"];
    const p = card.pricing || {};
    const rawAvg = Math.round(((p.rawMin||0) + (p.rawMax||0)) / 2);
    const cond = card.condition || {};
    const psaEq = cond.psaEquivalent;

    const div = document.createElement("div");
    div.className = "card";
    div.style.animationDelay = (i * 0.08) + "s";

    // PSA grid with highlight for estimated grade
    const psaRows = [10,9,8,7].map(g => {
      const price = p["psa" + g];
      const isMatch = psaEq === g;
      return `<div class="psa-cell${isMatch ? ' psa-highlight' : ''}">
        <div class="psa-grade">PSA ${g}${isMatch ? ' ★' : ''}</div>
        <div class="psa-price" style="color:${price ? '#fbbf24' : '#1e2a3a'}">${price ? fmt(price) : "-"}</div>
      </div>`;
    }).join("");

    const hasPsa = p.psa10 || p.psa9 || p.psa8 || p.psa7;

    // Condition detail grid
    const hasCondDetail = cond.surface || cond.corners || cond.centering || cond.edges;
    const condGrid = hasCondDetail ? `
      <div class="condition-detail">
        <div class="condition-title">CONDITION DETAIL</div>
        <div class="condition-grid">
          ${cond.surface ? `<div class="cond-item"><div class="cond-label">表面</div><div class="cond-value">${esc(cond.surface)}</div></div>` : ''}
          ${cond.corners ? `<div class="cond-item"><div class="cond-label">角</div><div class="cond-value">${esc(cond.corners)}</div></div>` : ''}
          ${cond.centering ? `<div class="cond-item"><div class="cond-label">センタリング</div><div class="cond-value">${esc(cond.centering)}</div></div>` : ''}
          ${cond.edges ? `<div class="cond-item"><div class="cond-label">エッジ</div><div class="cond-value">${esc(cond.edges)}</div></div>` : ''}
        </div>
      </div>
    ` : '';

    div.innerHTML = `
      <div class="card-inner">
        <div class="card-left">
          <div class="card-tags">
            ${card.isVintage ? '<span class="tag tag-vintage">旧裏</span>' : ""}
            ${card.isFirstEdition ? '<span class="tag tag-1st">初版</span>' : ""}
            ${card.isUltraRare ? '<span class="tag tag-ultra">超希少</span>' : ""}
            ${card.gradeCandidate ? '<span class="tag tag-psa">PSA推奨</span>' : ""}
            ${psaEq && psaEq >= 9 ? '<span class="tag tag-psa">PSA' + psaEq + '相当</span>' : ""}
          </div>
          <div class="card-name">${esc(card.name)}</div>
          <div class="card-meta">${esc(card.set || "")}${card.cardNumber ? " · " + esc(card.cardNumber) : ""} · ${esc(card.era || "")}</div>
          <span class="rarity-badge" style="background:${c.accent}15;border:1px solid ${c.accent}40">
            <span class="rarity-dot" style="background:${c.accent}"></span>
            <span style="color:${c.accent};font-size:12px;font-weight:700">${esc(c.label)}</span>
            <span class="rarity-score" style="color:${c.accent}">${card.rarityScore != null ? card.rarityScore + '/10' : ''}</span>
          </span>
          ${card.circulation ? `<div class="circulation">📦 流通: <b>${esc(card.circulation)}</b></div>` : ""}
        </div>
        <div class="card-right">
          <div class="card-avg" style="color:${c.accent}">${fmt(rawAvg)}</div>
          <div class="card-range">${fmt(p.rawMin)}〜${fmt(p.rawMax)}</div>
          <div class="card-cond">${esc(cond.overall || "")}${psaEq ? " (PSA" + psaEq + "相当)" : ""}</div>
        </div>
      </div>
      ${condGrid}
      ${hasPsa ? `
      <div class="psa-section">
        <div class="psa-title">PSA鑑定済み想定価格</div>
        <div class="psa-grid">${psaRows}</div>
      </div>` : ""}
      ${card.marketInsight ? `<div class="card-notes" style="color:#60a5fa;margin-top:8px">📈 ${esc(card.marketInsight)}</div>` : ""}
      ${card.notes ? `<div class="card-notes">${esc(card.notes)}</div>` : ""}
      ${card.gradeCandidateReason ? `<div class="card-notes" style="color:#6ee7b7">✅ ${esc(card.gradeCandidateReason)}</div>` : ""}
    `;
    list.appendChild(div);
  });

  document.getElementById("results").style.display = "block";

  document.getElementById("results").scrollIntoView({ behavior: "smooth", block: "start" });
}
</script>
</body>
</html>
